# Prefix: Ctrl+A (easier than Ctrl+B)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Detach bindings
bind d detach-client
bind D detach-client
bind -n F12 detach-client
bind -n C-q detach-client

# Enable mouse mode
set -g mouse on

# Large scrollback (100k lines)
set -g history-limit 100000

# Better terminal settings for SSH
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Vi keys in copy mode
setw -g mode-keys vi

# Mouse wheel scrolling - enters copy mode and scrolls naturally
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Shift+PageUp/Down for scrolling
bind -n S-PageUp copy-mode -eu
bind -n S-PageDown send-keys PageDown

# Quick copy mode entry (Ctrl+A then [ or Escape)
bind [ copy-mode
bind Escape copy-mode

# In copy mode:
#   - Scroll with mouse wheel, j/k, arrows, PageUp/PageDown
#   - Ctrl+u/Ctrl+d for half-page scroll
#   - q or Escape to exit copy mode
